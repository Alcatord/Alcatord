<svg width="100%" height="280" viewBox="0 0 1200 280" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- background -->
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0a0a"/>
      <stop offset="50%" stop-color="#1a0000"/>
      <stop offset="100%" stop-color="#0a0a0a"/>
    </linearGradient>

    <!-- hex grid pattern -->
    <pattern id="hexgrid" width="42" height="48" patternUnits="userSpaceOnUse" patternTransform="translate(0,0)">
      <polygon points="21,0 42,12 42,36 21,48 0,36 0,12" fill="none" stroke="#ff003333" stroke-width="1"/>
    </pattern>

    <filter id="glow">
      <feGaussianBlur stdDeviation="2.2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <clipPath id="frame">
      <rect x="0" y="0" width="1200" height="280" rx="0"/>
    </clipPath>
  </defs>

  <g clip-path="url(#frame)">
    <rect width="1200" height="280" fill="url(#bg)"/>
    <rect width="1200" height="280" fill="url(#hexgrid)"/>

    <!-- matrix rain columns -->
    <g font-family="Consolas, monospace" font-size="14" fill="#00ffcc" opacity="0.45">
      <g>
        <text x="40" y="-20">1 0 A 1 F 0 1 C 0 A 1 0 1 F</text>
        <animateTransform attributeName="transform" type="translate" from="0,-40" to="0,320" dur="4.2s" repeatCount="indefinite"/>
      </g>
      <g>
        <text x="140" y="-20">A C E S S 0 1 0 1 C 0 D E 1</text>
        <animateTransform attributeName="transform" type="translate" from="0,-40" to="0,320" dur="5.1s" begin="0.6s" repeatCount="indefinite"/>
      </g>
      <g>
        <text x="260" y="-20">0 1 R 0 0 T 1 0 1 K 3 Y 0 1</text>
        <animateTransform attributeName="transform" type="translate" from="0,-40" to="0,320" dur="3.6s" begin="1.1s" repeatCount="indefinite"/>
      </g>
      <g>
        <text x="920" y="-20">1 0 X 0 R 1 3 0 D 4 T 4 0 1</text>
        <animateTransform attributeName="transform" type="translate" from="0,-40" to="0,320" dur="4.7s" begin="0.3s" repeatCount="indefinite"/>
      </g>
      <g>
        <text x="1040" y="-20">0 F 1 W 3 B 0 1 H 4 C K 0 1</text>
        <animateTransform attributeName="transform" type="translate" from="0,-40" to="0,320" dur="5.6s" begin="1.4s" repeatCount="indefinite"/>
      </g>
      <g>
        <text x="1140" y="-20">1 1 0 S H 3 L L 0 1 0 P W N</text>
        <animateTransform attributeName="transform" type="translate" from="0,-40" to="0,320" dur="4.0s" begin="0.9s" repeatCount="indefinite"/>
      </g>
    </g>

    <!-- scanline sweep -->
    <rect x="0" y="0" width="1200" height="4" fill="#00ffcc" opacity="0.08">
      <animateTransform attributeName="transform" type="translate" from="0,0" to="0,280" dur="2.4s" repeatCount="indefinite"/>
    </rect>

    <!-- glitch title: red offset layer -->
    <text x="600" y="128" text-anchor="middle" font-family="'Courier New', monospace" font-weight="700"
          font-size="76" letter-spacing="6" fill="#ff0033" opacity="0.55" filter="url(#glow)">
      ALCATORD
      <animateTransform attributeName="transform" type="translate"
        values="0,0; -3,0; 2,0; -1,0; 0,0" dur="0.35s" repeatCount="indefinite"/>
    </text>

    <!-- glitch title: cyan offset layer -->
    <text x="600" y="128" text-anchor="middle" font-family="'Courier New', monospace" font-weight="700"
          font-size="76" letter-spacing="6" fill="#00ffcc" opacity="0.5" filter="url(#glow)">
      ALCATORD
      <animateTransform attributeName="transform" type="translate"
        values="0,0; 3,0; -2,0; 1,0; 0,0" dur="0.4s" repeatCount="indefinite"/>
    </text>

    <!-- glitch title: main white layer -->
    <text x="600" y="128" text-anchor="middle" font-family="'Courier New', monospace" font-weight="700"
          font-size="76" letter-spacing="6" fill="#f5f5f5">
      ALCATORD
      <animate attributeName="opacity" values="1;1;0.7;1;1" dur="2.6s" repeatCount="indefinite"/>
    </text>

    <!-- subtitle -->
    <text x="600" y="168" text-anchor="middle" font-family="Consolas, monospace" font-size="18" fill="#00ffcc" opacity="0.85">
      root@system:~# whoami
    </text>
    <text x="600" y="196" text-anchor="middle" font-family="Consolas, monospace" font-size="14" fill="#ff5566" opacity="0.8">
      &gt; cybersecurity student // developer // web detective_
      <animate attributeName="opacity" values="0.8;0.8;0.1;0.8;0.8" dur="1.6s" repeatCount="indefinite"/>
    </text>

    <!-- corner brackets, hacker HUD feel -->
    <g stroke="#ff0033" stroke-width="2" fill="none" opacity="0.7">
      <path d="M20,20 L20,50 M20,20 L50,20"/>
      <path d="M1180,20 L1180,50 M1180,20 L1150,20"/>
      <path d="M20,260 L20,230 M20,260 L50,260"/>
      <path d="M1180,260 L1180,230 M1180,260 L1150,260"/>
    </g>
  </g>
</svg>
