<svg width="100%" height="110" viewBox="0 0 1200 110" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0a0a"/>
      <stop offset="50%" stop-color="#1a0000"/>
      <stop offset="100%" stop-color="#0a0a0a"/>
    </linearGradient>
    <pattern id="hexgrid2" width="42" height="48" patternUnits="userSpaceOnUse">
      <polygon points="21,0 42,12 42,36 21,48 0,36 0,12" fill="none" stroke="#ff003322" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1200" height="110" fill="url(#bg2)"/>
  <rect width="1200" height="110" fill="url(#hexgrid2)"/>

  <rect x="0" y="0" width="1200" height="2" fill="#00ffcc" opacity="0.1">
    <animateTransform attributeName="transform" type="translate" from="0,0" to="0,110" dur="3s" repeatCount="indefinite"/>
  </rect>

  <text x="600" y="55" text-anchor="middle" font-family="Consolas, monospace" font-size="16" fill="#ff0033" opacity="0.9">
    &gt; connection_terminated
    <animate attributeName="opacity" values="0.9;0.9;0.2;0.9;0.9" dur="2s" repeatCount="indefinite"/>
  </text>
  <text x="600" y="80" text-anchor="middle" font-family="Consolas, monospace" font-size="13" fill="#00ffcc" opacity="0.7">
    made by Alcatord — the web detective
  </text>
</svg>
